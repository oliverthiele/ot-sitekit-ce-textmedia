<html xmlns="http://www.w3.org/1999/xhtml" lang="en"
      xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<head>
    <meta charset="utf-8">
    <title>Template: OtSitekitCeTextmedia</title>
</head>
<body>

<f:layout name="Default"/>

<f:section name="Header"/>

<f:section name="Main">
<f:spaceless>
    <f:switch expression="{data.ot_layout}">
        <f:comment><!-- Media top --></f:comment>
        <f:case value="100-media-100-text">
            <f:variable name="gridColumns" value="{xs:12}"/>
            <f:render section="Media" arguments="{_all}" />
            <div class="mt-3">
                <f:render partial="Header/All" arguments="{data: data, gridColumns: gridColumns}"/>
            </div>
            <f:render section="Text" arguments="{_all}" />
        </f:case>

        <f:comment><!-- Media left --></f:comment>

        <f:case value="50-media-50-text">
            <f:variable name="gridColumns" value="{xs:12,md:6}"/>
            <div class="row{f:if(condition: settings.otSitekitCeTextmedia.verticalAlign, then: ' align-items-center')}">
                <div class="col-md-6">
                    <f:render section="Media" arguments="{_all}" />
                </div>
                <div class="col-md-6 mt-3 mt-md-0">
                    <f:render partial="Header/All" arguments="{data: data, gridColumns: gridColumns}"/>
                    <f:render section="Text" arguments="{_all}" />
                </div>
            </div>
        </f:case>

        <f:case value="33-media-66-text">
            <f:variable name="gridColumns" value="{xs:12,md:4}"/>
            <div class="row{f:if(condition: settings.otSitekitCeTextmedia.verticalAlign, then: ' align-items-center')}">
                <div class="col-md-4">
                    <f:render section="Media" arguments="{_all}" />
                </div>
                <div class="col-md-8 mt-3 mt-md-0">
                    <f:render partial="Header/All" arguments="{data: data, gridColumns: gridColumns}"/>
                    <f:render section="Text" arguments="{_all}" />
                </div>
            </div>
        </f:case>

        <f:case value="25-media-75-text">
            <f:variable name="gridColumns" value="{xs:12,md:3}"/>
            <div class="row{f:if(condition: settings.otSitekitCeTextmedia.verticalAlign, then: ' align-items-center')}">
                <div class="col-md-3">
                    <f:render section="Media" arguments="{_all}" />
                </div>
                <div class="col-md-9 mt-3 mt-md-0">
                    <f:render partial="Header/All" arguments="{data: data, gridColumns: gridColumns}"/>
                    <f:render section="Text" arguments="{_all}" />
                </div>
            </div>
        </f:case>

        <f:comment><!-- Media right --></f:comment>

        <f:case value="50-text-50-media">
            <f:variable name="gridColumns" value="{xs:12,md:6}"/>

            <f:comment> <!-- <![CDATA[
             <f:variable name="numColumns" value="{xs:1,md:2}"/>
                gridColumns: gridColumns,
            ]]>	--> </f:comment>
            <div class="row{f:if(condition: settings.otSitekitCeTextmedia.verticalAlign, then: ' align-items-center')}">
                <div class="col-md-6 order-md-last">
                    <f:render section="Media" arguments="{_all}" />
                </div>
                <div class="col-md-6 order-md-first mt-3 mt-md-0">
                    <f:render partial="Header/All" arguments="{data: data, gridColumns: gridColumns}"/>
                    <f:render section="Text" arguments="{_all}"/>
                </div>
            </div>
        </f:case>

        <f:case value="66-text-33-media">
            <f:variable name="gridColumns" value="{xs:12,md:4}"/>
            <div class="row{f:if(condition: settings.otSitekitCeTextmedia.verticalAlign, then: ' align-items-center')}">
                <div class="col-md-4 order-md-last">
                    <f:render section="Media" arguments="{_all}" />
                </div>
                <div class="col-md-8 order-md-first mt-3 mt-md-0">
                    <f:render partial="Header/All" arguments="{data: data, gridColumns: gridColumns}"/>
                    <f:render section="Text" arguments="{_all}"/>
                </div>
            </div>
        </f:case>

        <f:case value="75-text-25-media">
            <f:variable name="gridColumns" value="{xs:12,md:3}"/>
            <div class="row{f:if(condition: settings.otSitekitCeTextmedia.verticalAlign, then: ' align-items-center')}">
                <div class="col-md-3 order-md-last">
                    <f:render section="Media" arguments="{_all}" />
                </div>
                <div class="col-md-9 order-md-first mt-3 mt-md-0">
                    <f:render partial="Header/All" arguments="{data: data, gridColumns: gridColumns}"/>
                    <f:render section="Text" arguments="{_all}"/>
                </div>
            </div>
        </f:case>

    </f:switch>
</f:spaceless>
</f:section>


<f:section name="Media">
    <f:for each="{files}" as="file">
        <f:render partial="Media/Media" arguments="{
            file: file,
            maxImageWidth: maxImageWidth,
            gridColumns: gridColumns,
            data: data,
            cropVariants: cropVariants,
            directParent: directParent,
            parentElements : parentElements
        }"/>
    </f:for>
</f:section>

<f:section name="Text">
    <f:if condition="{data.bodytext -> f:format.trim()} != ''">
        <f:if condition="{data.ot_text_columns} != ''">
            <f:then>
                <div class="auto-column-text">
                    {data.bodytext -> f:format.html()}
                </div>
            </f:then>
            <f:else>
                {data.bodytext -> f:format.html()}
            </f:else>
        </f:if>
    </f:if>
    <f:if condition="{irreButtons}">
        <f:render partial="IrreButtons" section="Main" arguments="{data: data, irreButtons: irreButtons}"/>
    </f:if>
</f:section>
</body>
</html>
